<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity Live Caption</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>CLARITY</h1>

        <p class="subtitle">
            Real-Time Speech to Text
        </p>

        <div class="controls">

            <button id="startBtn">
                🎤 Start
            </button>

            <button id="stopBtn">
                ⏹ Stop
            </button>

            <button id="clearBtn">
                🗑 Clear
            </button>

            <button id="saveBtn">
                📄 Save Transcript
            </button>

            <button id="summaryBtn">
                🤖 Summarize
            </button>

            <select id="languageSelect">

                <option value="Indonesian">🇮🇩 Indonesian</option>

                <option value="Chinese">🇹🇼 Chinese</option>

                <option value="Japanese">🇯🇵 Japanese</option>

            </select>
            
            <button id="translateBtn">
                🌍 Translate
            </button>

        </div>

        <p id="status">
            Not Listening
        </p>

        <div id="output">
            Your captions will appear here...
        </div>

        <div class="tts-section">

        <h2>Reply with Voice</h2>

        <textarea
            id="ttsInput"
            placeholder="Type your message here..."
        ></textarea>

        <button id="speakBtn">
            🔊 Speak
        </button>

        <button id="stopSpeakBtn">
            🔇 Stop Speaking
        </button>
        
    </div>
    
    <h2>AI Summary</h2>

    <div id="summaryOutput">
        AI summary will appear here...
    </div>

    <h2>Translation</h2>

    <div id="translationOutput">
        Translation will appear here...
    </div>

    <h2>💬 Ask AI</h2>

    <div class="ask-container">

        <input
            type="text"
            id="askInput"
            placeholder="Ask something about this conversation..."
        >

        <button id="askBtn">
            Ask
        </button>

    </div>

    <div id="askOutput">
        AI answer will appear here...
    </div>
</div>

    <script src="utils.js"></script>
    <script src="tts.js"></script>
    <script src="speech.js"></script>
    <script src="ai.js"></script>

</body>
</html>
